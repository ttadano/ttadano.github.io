project:
  type: website
  output-dir: _site
  # Regenerate _gen/*.md from references.bib + talks.bib before each render.
  pre-render: python3 scripts/render_bib.py
  # Explicit render list so Quarto ignores the legacy Hugo `content/` tree
  # during the migration. Trimmed at cutover (Phase 6).
  render:
    - "*.qmd"
    - "news/*.qmd"

website:
  title: "Terumasa Tadano"
  description: "Computational materials scientist — phonons, thermal transport, and materials design from first principles."
  site-url: "https://ttadano.github.io"
  repo-url: "https://github.com/ttadano/ttadano.github.io"
  google-analytics: "G-48HWEVBSFR"
  search: true
  navbar:
    pinned: true
    left:
      - href: index.qmd
        text: Home
      - href: publications.qmd
        text: Publications
      - href: talks.qmd
        text: Talks
      - href: projects.qmd
        text: Projects
      - href: people.qmd
        text: People
      - href: cv.qmd
        text: CV
    right:
      - icon: mortarboard-fill
        href: "https://scholar.google.com/citations?user=vo4EZggAAAAJ&hl=en"
        aria-label: Google Scholar
      - icon: github
        href: "https://github.com/ttadano"
        aria-label: GitHub
      - icon: linkedin
        href: "https://www.linkedin.com/in/terumasa-tadano-5b7506172/"
        aria-label: LinkedIn
      - icon: envelope-fill
        href: "index.html#contact"
        aria-label: Email
  page-footer:
    left: "© 2026 Terumasa Tadano"
    right: "Built with [Quarto](https://quarto.org)"

format:
  html:
    theme:
      light: litera
      dark: [litera, assets/dark.scss]
    css: assets/styles.css
    grid:
      body-width: 1100px
    toc: true
    toc-depth: 2
    anchor-sections: true
    link-external-newwindow: true
